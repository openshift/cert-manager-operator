apiVersion: operator.openshift.io/v1alpha1
kind: IstioCSR
metadata:
  name: default
spec:
  istioCSRConfig:
    certManager:
      issuerRef:
        name: istio-ca
        kind: Issuer
        group: cert-manager.io
      istioCACertificate:
        name: {{.ConfigMapName}}
        namespace: {{.CustomNamespace}}
        key: ca-cert.pem
    istiodTLSConfig:
      trustDomain: cluster.local
    istio:
      namespace: istio-system
