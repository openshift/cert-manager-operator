apiVersion: apiextensions.k8s.io/v1 # Hack because controller-gen complains if we don't have this
name: "IstioCSR"
crdName: istiocsrs.operator.openshift.io
tests:
  onCreate:
  # ==========================================
  # Metadata Tests
  # ==========================================
  - name: Should create IstioCSR with valid name
    resourceName: default
    initial: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: IstioCSR
      spec:
        istioCSRConfig:
          certManager:
            issuerRef:
              name: selfsigned-issuer
              kind: ClusterIssuer
              group: cert-manager.io
          istio:
            namespace: istio-system
          istiodTLSConfig:
            trustDomain: cluster.local
    expected: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: IstioCSR
      spec:
        istioCSRConfig:
          certManager:
            issuerRef:
              name: selfsigned-issuer
              kind: ClusterIssuer
              group: cert-manager.io
          istio:
            namespace: istio-system
            revisions:
              - default
          istiodTLSConfig:
            trustDomain: cluster.local
            certificateDuration: 1h
            certificateRenewBefore: 30m
            maxCertificateDuration: 1h
            privateKeyAlgorithm: RSA
            privateKeySize: 2048
          logFormat: text
          logLevel: 1

  - name: Should not allow creating IstioCSR with invalid name
    resourceName: invalid-name
    initial: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: IstioCSR
      spec:
        istioCSRConfig:
          certManager:
            issuerRef:
              name: selfsigned-issuer
              kind: ClusterIssuer
              group: cert-manager.io
          istio:
            namespace: istio-system
          istiodTLSConfig:
            trustDomain: cluster.local
    expectedError: "istiocsr is a singleton, .metadata.name must be 'default'"

  # ==========================================
  # IstioCSRConfig - CertManager Tests
  # ==========================================
  - name: Should create with issuerRef kind Issuer
    resourceName: default
    initial: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: IstioCSR
      spec:
        istioCSRConfig:
          certManager:
            issuerRef:
              name: my-issuer
              kind: Issuer
              group: cert-manager.io
          istio:
            namespace: istio-system
          istiodTLSConfig:
            trustDomain: cluster.local
    expected: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: IstioCSR
      spec:
        istioCSRConfig:
          certManager:
            issuerRef:
              name: my-issuer
              kind: Issuer
              group: cert-manager.io
          istio:
            namespace: istio-system
            revisions:
              - default
          istiodTLSConfig:
            trustDomain: cluster.local
            certificateDuration: 1h
            certificateRenewBefore: 30m
            maxCertificateDuration: 1h
            privateKeyAlgorithm: RSA
            privateKeySize: 2048
          logFormat: text
          logLevel: 1

  - name: Should not allow issuerRef kind other than Issuer or ClusterIssuer
    resourceName: default
    initial: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: IstioCSR
      spec:
        istioCSRConfig:
          certManager:
            issuerRef:
              name: my-issuer
              kind: InvalidKind
              group: cert-manager.io
          istio:
            namespace: istio-system
          istiodTLSConfig:
            trustDomain: cluster.local
    expectedError: "kind must be either 'Issuer' or 'ClusterIssuer'"

  - name: Should not allow issuerRef group other than cert-manager.io
    resourceName: default
    initial: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: IstioCSR
      spec:
        istioCSRConfig:
          certManager:
            issuerRef:
              name: my-issuer
              kind: ClusterIssuer
              group: invalid-group.io
          istio:
            namespace: istio-system
          istiodTLSConfig:
            trustDomain: cluster.local
    expectedError: "group must be 'cert-manager.io'"

