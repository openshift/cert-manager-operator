  # ==========================================
  # IstioCSRConfig - Affinity Tests
  # ==========================================
  - name: Should create with pod affinity
    resourceName: default
    initial: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: IstioCSR
      spec:
        istioCSRConfig:
          certManager:
            issuerRef:
              name: my-issuer
              kind: ClusterIssuer
              group: cert-manager.io
          istio:
            namespace: istio-system
          istiodTLSConfig:
            trustDomain: cluster.local
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: kubernetes.io/os
                        operator: In
                        values:
                          - linux
