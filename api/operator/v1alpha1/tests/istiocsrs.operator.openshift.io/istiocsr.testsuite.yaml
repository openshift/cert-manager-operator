          istiodTLSConfig:
            trustDomain: cluster.local
    updated: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: IstioCSR
      spec:
        istioCSRConfig:
          certManager:
            issuerRef:
              name: new-issuer
              kind: ClusterIssuer
              group: cert-manager.io
          istio:
            namespace: istio-system
          istiodTLSConfig:
            trustDomain: cluster.local
    expectedError: "issuerRef is immutable once set"

