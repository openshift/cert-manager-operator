apiVersion: apiextensions.k8s.io/v1 # Hack because controller-gen complains if we don't have this
name: "TrustManager"
crdName: trustmanagers.operator.openshift.io
tests:
  onCreate:
  # ==========================================
  # Metadata Tests
  # ==========================================
  - name: Should create TrustManager with valid name
    resourceName: cluster
    initial: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: TrustManager
      spec:
        trustManagerConfig: {}
    expected: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: TrustManager
      spec:
        trustManagerConfig:
          logLevel: 1
          logFormat: text
          trustNamespace: cert-manager
          filterExpiredCertificates: Disabled

  - name: Should not allow creating TrustManager with invalid name
    resourceName: invalid-name
    initial: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: TrustManager
      spec:
        trustManagerConfig: {}
    expectedError: "TrustManager is a singleton, .metadata.name must be 'cluster'"

  # ==========================================
  # LogLevel Tests
  # ==========================================
  - name: Should create with logLevel 5
    resourceName: cluster
    initial: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: TrustManager
      spec:
        trustManagerConfig:
          logLevel: 5
    expected: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: TrustManager
      spec:
        trustManagerConfig:
          logLevel: 5
          logFormat: text
          trustNamespace: cert-manager
          filterExpiredCertificates: Disabled

  - name: Should not allow logLevel below minimum
    resourceName: cluster
    initial: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: TrustManager
      spec:
        trustManagerConfig:
          logLevel: 0
    expectedError: "logLevel"

  - name: Should not allow logLevel above maximum
    resourceName: cluster
    initial: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: TrustManager
      spec:
        trustManagerConfig:
          logLevel: 6
    expectedError: "logLevel"

  # ==========================================
  # LogFormat Tests
  # ==========================================
  - name: Should create with logFormat json
    resourceName: cluster
    initial: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: TrustManager
      spec:
        trustManagerConfig:
          logFormat: json
    expected: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: TrustManager
      spec:
        trustManagerConfig:
          logLevel: 1
          logFormat: json
          trustNamespace: cert-manager
          filterExpiredCertificates: Disabled

  - name: Should not allow invalid logFormat
    resourceName: cluster
    initial: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: TrustManager
      spec:
        trustManagerConfig:
          logFormat: xml
    expectedError: "logFormat"

  # ==========================================
  # TrustNamespace Tests
  # ==========================================
  - name: Should create with custom trustNamespace
    resourceName: cluster
    initial: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: TrustManager
      spec:
        trustManagerConfig:
          trustNamespace: custom-namespace
    expected: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: TrustManager
      spec:
        trustManagerConfig:
          logLevel: 1
          logFormat: text
          trustNamespace: custom-namespace
          filterExpiredCertificates: Disabled

  # ==========================================
  # FilterExpiredCertificates Tests
  # ==========================================
  - name: Should create with filterExpiredCertificates Enabled
    resourceName: cluster
    initial: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: TrustManager
      spec:
        trustManagerConfig:
          filterExpiredCertificates: Enabled
    expected: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: TrustManager
      spec:
        trustManagerConfig:
          logLevel: 1
          logFormat: text
          trustNamespace: cert-manager
          filterExpiredCertificates: Enabled

  - name: Should not allow invalid filterExpiredCertificates value
    resourceName: cluster
    initial: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: TrustManager
      spec:
        trustManagerConfig:
          filterExpiredCertificates: Invalid
    expectedError: "filterExpiredCertificates"

  # ==========================================
  # DefaultCAPackage Tests
  # ==========================================
  - name: Should create with defaultCAPackage policy Enabled
    resourceName: cluster
    initial: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: TrustManager
      spec:
        trustManagerConfig:
          defaultCAPackage:
            policy: Enabled
    expected: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: TrustManager
      spec:
        trustManagerConfig:
          logLevel: 1
          logFormat: text
          trustNamespace: cert-manager
          filterExpiredCertificates: Disabled
          defaultCAPackage:
            policy: Enabled

  - name: Should not allow invalid defaultCAPackage policy value
    resourceName: cluster
    initial: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: TrustManager
      spec:
        trustManagerConfig:
          defaultCAPackage:
            policy: Invalid
    expectedError: "defaultCAPackage.policy"

  # ==========================================
  # SecretTargets Tests
  # ==========================================
  - name: Should create with secretTargets policy Custom and authorizedSecrets
    resourceName: cluster
    initial: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: TrustManager
      spec:
        trustManagerConfig:
          secretTargets:
            policy: Custom
            authorizedSecrets:
              - my-trust-bundle
              - another-bundle
    expected: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: TrustManager
      spec:
        trustManagerConfig:
          logLevel: 1
          logFormat: text
          trustNamespace: cert-manager
          filterExpiredCertificates: Disabled
          secretTargets:
            policy: Custom
            authorizedSecrets:
              - my-trust-bundle
              - another-bundle

  - name: Should not allow secretTargets policy Custom without authorizedSecrets
    resourceName: cluster
    initial: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: TrustManager
      spec:
        trustManagerConfig:
          secretTargets:
            policy: Custom
    expectedError: "authorizedSecrets must not be empty when policy is Custom"

  - name: Should not allow authorizedSecrets when policy is Disabled
    resourceName: cluster
    initial: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: TrustManager
      spec:
        trustManagerConfig:
          secretTargets:
            policy: Disabled
            authorizedSecrets:
              - my-secret
    expectedError: "authorizedSecrets must be empty when policy is not Custom"

  - name: Should not allow invalid secretTargets policy value
    resourceName: cluster
    initial: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: TrustManager
      spec:
        trustManagerConfig:
          secretTargets:
            policy: Invalid
    expectedError: "secretTargets.policy"

  # ==========================================
  # Deployment Config Tests
  # ==========================================
  - name: Should create with resources
    resourceName: cluster
    initial: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: TrustManager
      spec:
        trustManagerConfig:
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
    expected: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: TrustManager
      spec:
        trustManagerConfig:
          logLevel: 1
          logFormat: text
          trustNamespace: cert-manager
          filterExpiredCertificates: Disabled
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

  - name: Should create with affinity
    resourceName: cluster
    initial: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: TrustManager
      spec:
        trustManagerConfig:
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: kubernetes.io/os
                        operator: In
                        values:
                          - linux
    expected: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: TrustManager
      spec:
        trustManagerConfig:
          logLevel: 1
          logFormat: text
          trustNamespace: cert-manager
          filterExpiredCertificates: Disabled
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: kubernetes.io/os
                        operator: In
                        values:
                          - linux

  - name: Should create with tolerations
    resourceName: cluster
    initial: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: TrustManager
      spec:
        trustManagerConfig:
          tolerations:
            - key: node-role.kubernetes.io/master
              operator: Exists
              effect: NoSchedule
    expected: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: TrustManager
      spec:
        trustManagerConfig:
          logLevel: 1
          logFormat: text
          trustNamespace: cert-manager
          filterExpiredCertificates: Disabled
          tolerations:
            - key: node-role.kubernetes.io/master
              operator: Exists
              effect: NoSchedule

  - name: Should create with nodeSelector
    resourceName: cluster
    initial: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: TrustManager
      spec:
        trustManagerConfig:
          nodeSelector:
            kubernetes.io/os: linux
    expected: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: TrustManager
      spec:
        trustManagerConfig:
          logLevel: 1
          logFormat: text
          trustNamespace: cert-manager
          filterExpiredCertificates: Disabled
          nodeSelector:
            kubernetes.io/os: linux

  # ==========================================
  # ControllerConfig Tests
  # ==========================================
  - name: Should create with controllerConfig labels
    resourceName: cluster
    initial: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: TrustManager
      spec:
        trustManagerConfig: {}
        controllerConfig:
          labels:
            app.kubernetes.io/managed-by: cert-manager-operator
    expected: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: TrustManager
      spec:
        trustManagerConfig:
          logLevel: 1
          logFormat: text
          trustNamespace: cert-manager
          filterExpiredCertificates: Disabled
        controllerConfig:
          labels:
            app.kubernetes.io/managed-by: cert-manager-operator

  - name: Should create with controllerConfig annotations
    resourceName: cluster
    initial: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: TrustManager
      spec:
        trustManagerConfig: {}
        controllerConfig:
          annotations:
            custom-annotation: custom-value
    expected: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: TrustManager
      spec:
        trustManagerConfig:
          logLevel: 1
          logFormat: text
          trustNamespace: cert-manager
          filterExpiredCertificates: Disabled
        controllerConfig:
          annotations:
            custom-annotation: custom-value

  # ==========================================
  # Immutability Tests (onUpdate)
  # ==========================================
  onUpdate:
  - name: Should not allow changing trustNamespace after set
    resourceName: cluster
    initial: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: TrustManager
      spec:
        trustManagerConfig:
          trustNamespace: cert-manager
    updated: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: TrustManager
      spec:
        trustManagerConfig:
          trustNamespace: new-namespace
    expectedError: "trustNamespace is immutable once set"

  - name: Should allow updating logLevel
    resourceName: cluster
    initial: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: TrustManager
      spec:
        trustManagerConfig:
          logLevel: 1
    updated: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: TrustManager
      spec:
        trustManagerConfig:
          logLevel: 3
    expected: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: TrustManager
      spec:
        trustManagerConfig:
          logLevel: 3
          logFormat: text
          trustNamespace: cert-manager
          filterExpiredCertificates: Disabled

  - name: Should allow updating logFormat
    resourceName: cluster
    initial: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: TrustManager
      spec:
        trustManagerConfig:
          logFormat: text
    updated: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: TrustManager
      spec:
        trustManagerConfig:
          logFormat: json
    expected: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: TrustManager
      spec:
        trustManagerConfig:
          logLevel: 1
          logFormat: json
          trustNamespace: cert-manager
          filterExpiredCertificates: Disabled

  - name: Should allow updating filterExpiredCertificates
    resourceName: cluster
    initial: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: TrustManager
      spec:
        trustManagerConfig:
          filterExpiredCertificates: Disabled
    updated: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: TrustManager
      spec:
        trustManagerConfig:
          filterExpiredCertificates: Enabled
    expected: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: TrustManager
      spec:
        trustManagerConfig:
          logLevel: 1
          logFormat: text
          trustNamespace: cert-manager
          filterExpiredCertificates: Enabled

  - name: Should allow updating defaultCAPackage policy
    resourceName: cluster
    initial: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: TrustManager
      spec:
        trustManagerConfig:
          defaultCAPackage:
            policy: Disabled
    updated: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: TrustManager
      spec:
        trustManagerConfig:
          defaultCAPackage:
            policy: Enabled
    expected: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: TrustManager
      spec:
        trustManagerConfig:
          logLevel: 1
          logFormat: text
          trustNamespace: cert-manager
          filterExpiredCertificates: Disabled
          defaultCAPackage:
            policy: Enabled

  - name: Should allow updating secretTargets policy from Disabled to Custom
    resourceName: cluster
    initial: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: TrustManager
      spec:
        trustManagerConfig:
          secretTargets:
            policy: Disabled
    updated: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: TrustManager
      spec:
        trustManagerConfig:
          secretTargets:
            policy: Custom
            authorizedSecrets:
              - my-secret
    expected: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: TrustManager
      spec:
        trustManagerConfig:
          logLevel: 1
          logFormat: text
          trustNamespace: cert-manager
          filterExpiredCertificates: Disabled
          secretTargets:
            policy: Custom
            authorizedSecrets:
              - my-secret

  - name: Should allow adding more authorizedSecrets to existing Custom policy
    resourceName: cluster
    initial: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: TrustManager
      spec:
        trustManagerConfig:
          secretTargets:
            policy: Custom
            authorizedSecrets:
              - secret-one
    updated: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: TrustManager
      spec:
        trustManagerConfig:
          secretTargets:
            policy: Custom
            authorizedSecrets:
              - secret-one
              - secret-two
    expected: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: TrustManager
      spec:
        trustManagerConfig:
          logLevel: 1
          logFormat: text
          trustNamespace: cert-manager
          filterExpiredCertificates: Disabled
          secretTargets:
            policy: Custom
            authorizedSecrets:
              - secret-one
              - secret-two

  - name: Should allow changing policy from Custom to Disabled
    resourceName: cluster
    initial: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: TrustManager
      spec:
        trustManagerConfig:
          secretTargets:
            policy: Custom
            authorizedSecrets:
              - my-secret
    updated: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: TrustManager
      spec:
        trustManagerConfig:
          secretTargets:
            policy: Disabled
    expected: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: TrustManager
      spec:
        trustManagerConfig:
          logLevel: 1
          logFormat: text
          trustNamespace: cert-manager
          filterExpiredCertificates: Disabled
          secretTargets:
            policy: Disabled

  - name: Should not allow emptying authorizedSecrets when policy is Custom
    resourceName: cluster
    initial: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: TrustManager
      spec:
        trustManagerConfig:
          secretTargets:
            policy: Custom
            authorizedSecrets:
              - my-secret
    updated: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: TrustManager
      spec:
        trustManagerConfig:
          secretTargets:
            policy: Custom
            authorizedSecrets: []
    expectedError: "authorizedSecrets must not be empty when policy is Custom"

  - name: Should not allow adding authorizedSecrets when policy remains Disabled
    resourceName: cluster
    initial: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: TrustManager
      spec:
        trustManagerConfig:
          secretTargets:
            policy: Disabled
    updated: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: TrustManager
      spec:
        trustManagerConfig:
          secretTargets:
            policy: Disabled
            authorizedSecrets:
              - my-secret
    expectedError: "authorizedSecrets must be empty when policy is not Custom"

  - name: Should allow removing some but not all authorizedSecrets when policy is Custom
    resourceName: cluster
    initial: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: TrustManager
      spec:
        trustManagerConfig:
          secretTargets:
            policy: Custom
            authorizedSecrets:
              - secret-one
              - secret-two
              - secret-three
    updated: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: TrustManager
      spec:
        trustManagerConfig:
          secretTargets:
            policy: Custom
            authorizedSecrets:
              - secret-one
    expected: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: TrustManager
      spec:
        trustManagerConfig:
          logLevel: 1
          logFormat: text
          trustNamespace: cert-manager
          filterExpiredCertificates: Disabled
          secretTargets:
            policy: Custom
            authorizedSecrets:
              - secret-one
