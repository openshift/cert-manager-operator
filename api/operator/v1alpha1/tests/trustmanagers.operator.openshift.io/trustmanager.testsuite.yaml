apiVersion: apiextensions.k8s.io/v1
name: "TrustManager"
crdName: trustmanagers.operator.openshift.io
tests:
  onCreate:
    - name: Should be able to create a minimal TrustManager with required fields only
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: TrustManager
        metadata:
          name: cluster
        spec:
          trustManagerConfig: {}
      expected: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: TrustManager
        metadata:
          name: cluster
        spec:
          trustManagerConfig:
            logLevel: 1
            logFormat: "text"
            trustNamespace: "cert-manager"
            filterExpiredCertificates: "Disabled"
            secretTargets:
              policy: "Disabled"
            defaultCAPackage:
              policy: "Disabled"

    - name: Should reject TrustManager with name other than cluster
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: TrustManager
        metadata:
          name: not-cluster
        spec:
          trustManagerConfig: {}
      expectedError: "TrustManager is a singleton, .metadata.name must be 'cluster'"

    - name: Should accept logFormat text
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: TrustManager
        metadata:
          name: cluster
        spec:
          trustManagerConfig:
            logFormat: "text"
      expected: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: TrustManager
        metadata:
          name: cluster
        spec:
          trustManagerConfig:
            logFormat: "text"

    - name: Should accept logFormat json
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: TrustManager
        metadata:
          name: cluster
        spec:
          trustManagerConfig:
            logFormat: "json"
      expected: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: TrustManager
        metadata:
          name: cluster
        spec:
          trustManagerConfig:
            logFormat: "json"

    - name: Should reject invalid logFormat
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: TrustManager
        metadata:
          name: cluster
        spec:
          trustManagerConfig:
            logFormat: "yaml"
      expectedError: "Unsupported value"

    - name: Should accept logLevel 1
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: TrustManager
        metadata:
          name: cluster
        spec:
          trustManagerConfig:
            logLevel: 1
      expected: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: TrustManager
        metadata:
          name: cluster
        spec:
          trustManagerConfig:
            logLevel: 1

    - name: Should accept logLevel 5
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: TrustManager
        metadata:
          name: cluster
        spec:
          trustManagerConfig:
            logLevel: 5
      expected: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: TrustManager
        metadata:
          name: cluster
        spec:
          trustManagerConfig:
            logLevel: 5

    - name: Should reject logLevel below minimum (0)
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: TrustManager
        metadata:
          name: cluster
        spec:
          trustManagerConfig:
            logLevel: 0
      expectedError: "spec.trustManagerConfig.logLevel"

    - name: Should reject logLevel above maximum (6)
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: TrustManager
        metadata:
          name: cluster
        spec:
          trustManagerConfig:
            logLevel: 6
      expectedError: "spec.trustManagerConfig.logLevel"

    - name: Should accept valid trustNamespace
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: TrustManager
        metadata:
          name: cluster
        spec:
          trustManagerConfig:
            trustNamespace: "my-trust-ns"
      expected: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: TrustManager
        metadata:
          name: cluster
        spec:
          trustManagerConfig:
            trustNamespace: "my-trust-ns"

    - name: Should reject trustNamespace exceeding maxLength of 63
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: TrustManager
        metadata:
          name: cluster
        spec:
          trustManagerConfig:
            trustNamespace: "this-namespace-name-is-way-too-long-and-exceeds-the-maximum-length-of-63-characters"
      expectedError: "spec.trustManagerConfig.trustNamespace"

    - name: Should accept filterExpiredCertificates Enabled
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: TrustManager
        metadata:
          name: cluster
        spec:
          trustManagerConfig:
            filterExpiredCertificates: "Enabled"
      expected: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: TrustManager
        metadata:
          name: cluster
        spec:
          trustManagerConfig:
            filterExpiredCertificates: "Enabled"

    - name: Should accept filterExpiredCertificates Disabled
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: TrustManager
        metadata:
          name: cluster
        spec:
          trustManagerConfig:
            filterExpiredCertificates: "Disabled"
      expected: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: TrustManager
        metadata:
          name: cluster
        spec:
          trustManagerConfig:
            filterExpiredCertificates: "Disabled"

    - name: Should reject invalid filterExpiredCertificates value
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: TrustManager
        metadata:
          name: cluster
        spec:
          trustManagerConfig:
            filterExpiredCertificates: "Invalid"
      expectedError: "Unsupported value"

    - name: Should accept secretTargets with policy Disabled
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: TrustManager
        metadata:
          name: cluster
        spec:
          trustManagerConfig:
            secretTargets:
              policy: "Disabled"
      expected: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: TrustManager
        metadata:
          name: cluster
        spec:
          trustManagerConfig:
            secretTargets:
              policy: "Disabled"

    - name: Should accept secretTargets with policy Custom and authorizedSecrets
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: TrustManager
        metadata:
          name: cluster
        spec:
          trustManagerConfig:
            secretTargets:
              policy: "Custom"
              authorizedSecrets:
                - "my-trust-bundle"
      expected: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: TrustManager
        metadata:
          name: cluster
        spec:
          trustManagerConfig:
            secretTargets:
              policy: "Custom"
              authorizedSecrets:
                - "my-trust-bundle"

    - name: Should reject secretTargets with policy Custom and empty authorizedSecrets
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: TrustManager
        metadata:
          name: cluster
        spec:
          trustManagerConfig:
            secretTargets:
              policy: "Custom"
              authorizedSecrets: []
      expectedError: "authorizedSecrets must not be empty when policy is Custom"

    - name: Should reject secretTargets with policy Custom and no authorizedSecrets
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: TrustManager
        metadata:
          name: cluster
        spec:
          trustManagerConfig:
            secretTargets:
              policy: "Custom"
      expectedError: "authorizedSecrets must not be empty when policy is Custom"

    - name: Should reject secretTargets with policy Disabled and authorizedSecrets set
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: TrustManager
        metadata:
          name: cluster
        spec:
          trustManagerConfig:
            secretTargets:
              policy: "Disabled"
              authorizedSecrets:
                - "my-secret"
      expectedError: "authorizedSecrets must be empty when policy is not Custom"

    - name: Should reject invalid secretTargets policy
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: TrustManager
        metadata:
          name: cluster
        spec:
          trustManagerConfig:
            secretTargets:
              policy: "Invalid"
      expectedError: "Unsupported value"

    - name: Should accept defaultCAPackage with policy Enabled
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: TrustManager
        metadata:
          name: cluster
        spec:
          trustManagerConfig:
            defaultCAPackage:
              policy: "Enabled"
      expected: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: TrustManager
        metadata:
          name: cluster
        spec:
          trustManagerConfig:
            defaultCAPackage:
              policy: "Enabled"

    - name: Should accept defaultCAPackage with policy Disabled
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: TrustManager
        metadata:
          name: cluster
        spec:
          trustManagerConfig:
            defaultCAPackage:
              policy: "Disabled"
      expected: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: TrustManager
        metadata:
          name: cluster
        spec:
          trustManagerConfig:
            defaultCAPackage:
              policy: "Disabled"

    - name: Should reject invalid defaultCAPackage policy
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: TrustManager
        metadata:
          name: cluster
        spec:
          trustManagerConfig:
            defaultCAPackage:
              policy: "Invalid"
      expectedError: "Unsupported value"

    - name: Should accept controllerConfig with labels and annotations
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: TrustManager
        metadata:
          name: cluster
        spec:
          trustManagerConfig: {}
          controllerConfig:
            labels:
              my-label: my-value
            annotations:
              my-annotation: my-value
      expected: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: TrustManager
        metadata:
          name: cluster
        spec:
          trustManagerConfig: {}
          controllerConfig:
            labels:
              my-label: my-value
            annotations:
              my-annotation: my-value

    - name: Should accept tolerations
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: TrustManager
        metadata:
          name: cluster
        spec:
          trustManagerConfig:
            tolerations:
              - key: "node-role.kubernetes.io/master"
                operator: "Exists"
                effect: "NoSchedule"
      expected: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: TrustManager
        metadata:
          name: cluster
        spec:
          trustManagerConfig:
            tolerations:
              - key: "node-role.kubernetes.io/master"
                operator: "Exists"
                effect: "NoSchedule"

    - name: Should accept nodeSelector
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: TrustManager
        metadata:
          name: cluster
        spec:
          trustManagerConfig:
            nodeSelector:
              kubernetes.io/os: linux
      expected: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: TrustManager
        metadata:
          name: cluster
        spec:
          trustManagerConfig:
            nodeSelector:
              kubernetes.io/os: linux

    - name: Should accept full configuration with all fields
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: TrustManager
        metadata:
          name: cluster
        spec:
          trustManagerConfig:
            logLevel: 3
            logFormat: "json"
            trustNamespace: "my-trust-ns"
            filterExpiredCertificates: "Enabled"
            secretTargets:
              policy: "Custom"
              authorizedSecrets:
                - "bundle-secret-1"
                - "bundle-secret-2"
            defaultCAPackage:
              policy: "Enabled"
            nodeSelector:
              kubernetes.io/os: linux
            tolerations:
              - key: "node-role.kubernetes.io/master"
                operator: "Exists"
                effect: "NoSchedule"
          controllerConfig:
            labels:
              team: security
            annotations:
              description: trust-manager deployment
      expected: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: TrustManager
        metadata:
          name: cluster
        spec:
          trustManagerConfig:
            logLevel: 3
            logFormat: "json"
            trustNamespace: "my-trust-ns"
            filterExpiredCertificates: "Enabled"
            secretTargets:
              policy: "Custom"
              authorizedSecrets:
                - "bundle-secret-1"
                - "bundle-secret-2"
            defaultCAPackage:
              policy: "Enabled"
            nodeSelector:
              kubernetes.io/os: linux
            tolerations:
              - key: "node-role.kubernetes.io/master"
                operator: "Exists"
                effect: "NoSchedule"
          controllerConfig:
            labels:
              team: security
            annotations:
              description: trust-manager deployment

  onUpdate:
    - name: Should not allow changing immutable trustNamespace
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: TrustManager
        metadata:
          name: cluster
        spec:
          trustManagerConfig:
            trustNamespace: "cert-manager"
      updated: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: TrustManager
        metadata:
          name: cluster
        spec:
          trustManagerConfig:
            trustNamespace: "different-namespace"
      expectedError: "trustNamespace is immutable once set"

    - name: Should allow updating logLevel
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: TrustManager
        metadata:
          name: cluster
        spec:
          trustManagerConfig:
            logLevel: 1
      updated: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: TrustManager
        metadata:
          name: cluster
        spec:
          trustManagerConfig:
            logLevel: 3
      expected: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: TrustManager
        metadata:
          name: cluster
        spec:
          trustManagerConfig:
            logLevel: 3

    - name: Should allow updating logFormat
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: TrustManager
        metadata:
          name: cluster
        spec:
          trustManagerConfig:
            logFormat: "text"
      updated: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: TrustManager
        metadata:
          name: cluster
        spec:
          trustManagerConfig:
            logFormat: "json"
      expected: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: TrustManager
        metadata:
          name: cluster
        spec:
          trustManagerConfig:
            logFormat: "json"

    - name: Should allow updating filterExpiredCertificates
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: TrustManager
        metadata:
          name: cluster
        spec:
          trustManagerConfig:
            filterExpiredCertificates: "Disabled"
      updated: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: TrustManager
        metadata:
          name: cluster
        spec:
          trustManagerConfig:
            filterExpiredCertificates: "Enabled"
      expected: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: TrustManager
        metadata:
          name: cluster
        spec:
          trustManagerConfig:
            filterExpiredCertificates: "Enabled"

    - name: Should allow updating secretTargets from Disabled to Custom
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: TrustManager
        metadata:
          name: cluster
        spec:
          trustManagerConfig:
            secretTargets:
              policy: "Disabled"
      updated: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: TrustManager
        metadata:
          name: cluster
        spec:
          trustManagerConfig:
            secretTargets:
              policy: "Custom"
              authorizedSecrets:
                - "my-secret"
      expected: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: TrustManager
        metadata:
          name: cluster
        spec:
          trustManagerConfig:
            secretTargets:
              policy: "Custom"
              authorizedSecrets:
                - "my-secret"

    - name: Should allow updating defaultCAPackage from Disabled to Enabled
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: TrustManager
        metadata:
          name: cluster
        spec:
          trustManagerConfig:
            defaultCAPackage:
              policy: "Disabled"
      updated: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: TrustManager
        metadata:
          name: cluster
        spec:
          trustManagerConfig:
            defaultCAPackage:
              policy: "Enabled"
      expected: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: TrustManager
        metadata:
          name: cluster
        spec:
          trustManagerConfig:
            defaultCAPackage:
              policy: "Enabled"

    - name: Should reject update of secretTargets to Custom without authorizedSecrets
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: TrustManager
        metadata:
          name: cluster
        spec:
          trustManagerConfig:
            secretTargets:
              policy: "Disabled"
      updated: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: TrustManager
        metadata:
          name: cluster
        spec:
          trustManagerConfig:
            secretTargets:
              policy: "Custom"
      expectedError: "authorizedSecrets must not be empty when policy is Custom"
